name: Build and Push Docker Image

on:
  push:
    branches: [ master ]

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-runtime:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build runtime stage
      uses: docker/build-push-action@v5
      with:
        context: .
        target: runtime
        platforms: linux/amd64,linux/arm64
        push: false
        cache-from: type=gha,scope=claudecode-runtime
        cache-to: type=gha,mode=max,scope=claudecode-runtime

  build-claudecode:
    runs-on: ubuntu-latest
    needs: build-runtime

    strategy:
      matrix:
        include:
          - tool: claude
            extra_tags: "nbr23/claudecode:latest\nnbr23/claudecode:claude"
            version_jq: '.devDependencies["@anthropic-ai/claude-code"]'
            version_prefix: claude-code
            build_arg: CLAUDE_VERSION
          - tool: opencode
            extra_tags: "nbr23/claudecode:opencode"
            version_jq: '.devDependencies["opencode-ai"]'
            version_prefix: opencode
            build_arg: OPENCODE_VERSION
          - tool: codex
            extra_tags: "nbr23/claudecode:codex"
            version_jq: '.dependencies["@openai/codex"]'
            version_prefix: codex
            build_arg: CODEX_VERSION
          - tool: copilot
            extra_tags: "nbr23/claudecode:copilot"
            version_jq: '.dependencies["@github/copilot"]'
            version_prefix: copilot
            build_arg: COPILOT_VERSION

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract version
      id: versions
      run: |
        VERSION=$(jq -r '${{ matrix.version_jq }}' package.json)
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        target: ${{ matrix.tool }}
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        build-args: ${{ matrix.build_arg }}=${{ steps.versions.outputs.version }}
        tags: |
          ${{ matrix.extra_tags }}
          nbr23/claudecode:${{ matrix.version_prefix }}-${{ steps.versions.outputs.version }}
        cache-from: |
          type=gha,scope=claudecode-runtime
          type=gha,scope=claudecode-${{ matrix.tool }}
        cache-to: type=gha,mode=max,scope=claudecode-${{ matrix.tool }}

  build-gemini-cli:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract gemini version
      id: versions
      run: |
        GEMINI_VERSION=$(jq -r '.devDependencies["@google/gemini-cli"]' package.json)
        echo "gemini=$GEMINI_VERSION" >> $GITHUB_OUTPUT

    - name: Build and push gemini-cli image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: Dockerfile.gemini
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        build-args: GEMINI_VERSION=${{ steps.versions.outputs.gemini }}
        tags: |
          nbr23/gemini-cli:latest
          nbr23/gemini-cli:${{ steps.versions.outputs.gemini }}
        cache-from: type=gha,scope=gemini-cli
        cache-to: type=gha,mode=max,scope=gemini-cli
